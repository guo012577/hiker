<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="referrer" content="unsafe-url" />
    <title>短视频</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#000;color:#fff;-webkit-tap-highlight-color:transparent;user-select:none}
        .sv-page{width:100%;height:100%;position:relative}
        .sv-stage{width:100%;height:100%;position:relative;overflow:hidden;background:#111}
        .sv-swiper{width:100%;height:100%}
        .sv-slide{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;background:#000}

        /* Card */
        .sv-card{width:100%;height:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
        .sv-card-media{width:100%;height:100%;position:absolute;inset:0}
        .sv-card-media video{width:100%;height:100%;object-fit:contain;display:block;background:#000}
        .sv-card-poster{width:100%;height:100%;object-fit:contain;display:block;background:#000;position:absolute;inset:0;z-index:1;transition:opacity .4s}
        .sv-card-poster.is-hidden{opacity:0;pointer-events:none}
        .sv-card-progress{position:absolute;bottom:110px;left:0;right:80px;height:3px;z-index:12;background:rgba(255,255,255,.15)}
        .sv-card-progress-played{height:100%;width:0%;background:linear-gradient(90deg,#ff6b6b,#ee5a24);transition:width .1s linear}

        /* 长按快进指示 */
        .sv-ff-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;color:#fff;font-size:18px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .2s;text-shadow:0 2px 8px rgba(0,0,0,.5);background:rgba(0,0,0,.4);padding:8px 20px;border-radius:12px}
        .sv-ff-active .sv-ff-indicator{opacity:1}

        /* Meta */
        .sv-card-meta{position:absolute;bottom:0;left:0;right:80px;padding:16px 16px 24px;z-index:5;background:linear-gradient(transparent,rgba(0,0,0,.7));pointer-events:none}
        .sv-card-meta *{pointer-events:auto}
        .sv-card-author{display:flex;align-items:center;gap:8px;margin-bottom:6px}
        .sv-card-author-avatar{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.5);flex-shrink:0;object-fit:cover}
        .sv-card-author-name{font-size:14px;font-weight:600;color:#fff;text-decoration:none}
        .sv-card-title{font-size:15px;font-weight:500;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 3px rgba(0,0,0,.5)}
        .sv-card-tags{display:flex;flex-wrap:wrap;gap:6px;list-style:none}
        .sv-card-tag{font-size:12px;color:#aaa;text-decoration:none;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:10px}
        .sv-card-time{font-size:11px;color:#888;margin-top:4px;display:block}

        /* 播放进度指示 (如 3/17018) */
        .sv-card-index{font-size:11px;color:#ffd479;margin-top:2px;display:block;font-variant-numeric:tabular-nums}

        /* Right actions */
        .sv-stage-overlay{position:absolute;right:8px;bottom:100px;z-index:8;pointer-events:none}
        .sv-actions{display:flex;flex-direction:column;align-items:center;gap:18px;pointer-events:auto}
        .sv-action{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:#fff;cursor:pointer;padding:0;font-family:inherit;min-width:48px}
        .sv-action-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);border-radius:50%;backdrop-filter:blur(4px);transition:transform .15s}
        .sv-action-icon svg{width:24px;height:24px;fill:#fff}
        .sv-action:active .sv-action-icon{transform:scale(.88)}
        .sv-action-count{font-size:11px;color:#ddd;text-shadow:0 1px 2px rgba(0,0,0,.5)}
        .sv-action--avatar{position:relative}
        .sv-action-avatar-link img{width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:cover;display:block}
        .sv-action-follow{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:22px;height:22px;border-radius:50%;background:#ff4757;border:2px solid #000;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;color:#fff}
        .sv-action-follow svg{width:12px;height:12px}
        .sv-mute-icon--off{display:none}
        .is-muted .sv-mute-icon--on{display:none}
        .is-muted .sv-mute-icon--off{display:block}
        .is-liked .sv-action-icon svg{fill:#ff4757}
        .is-favorited .sv-action-icon svg{fill:#ffa502}

        /* Hint */
        .sv-wheel-hint{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .4s}
        .sv-wheel-hint.is-visible{opacity:1;pointer-events:auto}
        .sv-wheel-inner{text-align:center;padding:32px}
        .sv-wheel-anim{margin-bottom:20px}
        .sv-wheel-dot{display:block;width:12px;height:12px;margin:0 auto 8px;background:#fff;border-radius:50%;animation:wb 1.4s ease infinite}
        .sv-wheel-arrow{display:block;width:28px;height:28px;margin:0 auto;border:solid #fff;border-width:0 3px 3px 0;transform:rotate(45deg);animation:wa 1.4s ease infinite}
        @keyframes wb{0%,100%{opacity:.4;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}
        @keyframes wa{0%,100%{opacity:.4;transform:rotate(45deg) translateY(0)}50%{opacity:1;transform:rotate(45deg) translateY(4px)}}
        .sv-wheel-title{font-size:18px;font-weight:600;margin-bottom:8px}
        .sv-wheel-desc{font-size:14px;color:#aaa;margin-bottom:24px}
        .sv-wheel-close{background:#ee5a24;color:#fff;border:none;padding:10px 40px;border-radius:24px;font-size:15px;cursor:pointer;font-weight:600}

        /* Loading */
        .sv-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:6;pointer-events:none;opacity:0;transition:opacity .3s}
        .sv-loading.is-visible{opacity:1}
        .sv-loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .sv-loading-text{font-size:13px;color:#aaa;margin-top:10px}

        /* Error */
        .sv-error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:6;gap:12px;pointer-events:none;opacity:0;transition:opacity .3s}
        .sv-error.is-visible{opacity:1;pointer-events:auto}
        .sv-error-icon svg{width:64px;height:42px;fill:#666}
        .sv-error-msg{font-size:14px;color:#888}
        .sv-error-retry{background:#333;color:#fff;border:none;padding:8px 24px;border-radius:20px;cursor:pointer;font-size:14px}

        /* Fullscreen btn */
        .sv-fullscreen-icon--exit{display:none}
        .sv-fullscreen-icon--enter{display:block}
        .is-fullscreen .sv-fullscreen-icon--enter{display:none}
        .is-fullscreen .sv-fullscreen-icon--exit{display:block}

        /* vjs overrides */
        .video-js.vjs-fill{width:100%!important;height:100%!important;position:absolute!important;top:0;left:0}
        .video-js .vjs-big-play-button{display:none!important}
        .video-js .vjs-control-bar{display:none!important}
        .video-js .vjs-loading-spinner{display:none!important}
        .video-js .vjs-tech{pointer-events:none}

        @media(max-width:640px){
            .sv-card-meta{padding:12px 12px 18px;right:68px}
            .sv-stage-overlay{right:4px;bottom:80px}
            .sv-actions{gap:14px}
            .sv-action-icon{width:38px;height:38px}
            .sv-action-icon svg{width:20px;height:20px}
            .sv-action-avatar-link img{width:40px;height:40px}
            .sv-action-follow{width:18px;height:18px}
            .sv-action-follow svg{width:10px;height:10px}
            .sv-set-panel{width:80%}
            .sv-card-progress{bottom:80px;right:68px}
        }
    
  /* ===== 设置面板 ===== */
  .sv-set-overlay{position:fixed;inset:0;z-index:65;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .3s}
  .sv-set-overlay.is-visible{opacity:1;pointer-events:auto}
  .sv-set-panel{position:fixed;top:0;right:0;bottom:0;width:72%;max-width:320px;background:rgba(21,21,31,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:70;border-radius:16px 0 0 16px;transform:translateX(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;overflow:hidden;box-shadow:-4px 0 20px rgba(0,0,0,.5)}
  .sv-set-panel.open{transform:translateX(0)}
  .sv-set-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid rgba(255,255,255,.08);font-size:16px;font-weight:600;position:sticky;top:0;background:transparent}
  .sv-set-close{background:none;border:none;color:#aaa;font-size:26px;line-height:1;cursor:pointer}
  .sv-set-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08)}
  .sv-set-tab{flex:1;background:none;border:none;color:#aaa;padding:12px;font-size:14px;cursor:pointer;font-family:inherit}
  .sv-set-tab.is-active{color:#fff;border-bottom:2px solid #ee5a24}
  .sv-set-page{padding:16px;overflow-y:auto;overflow-x:hidden;flex:1;min-height:0;height:0;-webkit-overflow-scrolling:touch}
  .sv-set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px}
  .sv-set-row input[type=checkbox]{width:44px;height:24px}
  .sv-set-btn-action{display:block;width:100%;margin-top:12px;background:#ee5a24;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600}
  .sv-set-hint{margin-top:12px;font-size:12px;color:#7fd6ff;min-height:16px;opacity:0;transition:opacity .2s}
  .sv-set-hint.is-visible{opacity:1}
  .sv-tuwei-box{border-top:1px solid rgba(255,255,255,.08);margin-top:12px;padding-top:12px}
  .sv-tuwei-box .sv-tuwei-title{font-size:14px;color:#fff;margin-bottom:4px}
  .sv-tuwei-box label{display:block;font-size:12px;color:#aaa;margin:10px 0 4px}
  .sv-tuwei-box input{width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:#1a1a1a;color:#fff;font-size:14px}
  .sv-tuwei-box #tuweiHint{opacity:1;color:#80d8ff}
  .sv-set-body{flex:1;display:flex;flex-direction:column;min-height:0;height:0;overflow:hidden}
  .sv-set-manage-bar{margin-bottom:10px}
  .sv-mng-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.04);margin-bottom:6px}
  .sv-mng-row.is-locked{background:rgba(238,90,36,.10)}
  .sv-mng-info{flex:1;min-width:0}
  .sv-mng-name{font-size:14px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sv-mng-sub{font-size:11px;color:#999}
  .sv-mng-ops{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .sv-mng-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:12px;padding:5px 8px;border-radius:7px;cursor:pointer;font-family:inherit}
  .sv-mng-del{background:rgba(255,80,80,.25)}
  .sv-src-add-form{padding:12px;background:rgba(255,255,255,.04);border-radius:10px;margin-top:10px}
  .sv-src-add-form label{display:block;font-size:12px;color:#aaa;margin:8px 0 4px}
  .sv-src-add-form input,.sv-src-add-form select{width:100%;background:#222;color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:8px;font-size:13px;font-family:inherit;box-sizing:border-box}
  .sv-form-actions{display:flex;gap:8px;margin-top:12px;align-items:center}
  .sv-feed-quota{position:fixed;top:54px;left:16px;z-index:26;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);padding:3px 12px;border-radius:16px;font-size:12px;color:#ffd479;border:1px solid rgba(255,212,121,.3)}
  .sv-cat-popup{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:flex-end;padding-top:80px;padding-right:12px}
  .sv-cat-popup[hidden]{display:none}
  .sv-cat-popup-inner{min-width:180px;max-width:min(300px,calc(100vw - 48px));max-height:min(80vh,calc(100vh - 100px));background:rgba(21,21,31,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;display:flex;flex-direction:column;animation:catRight .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);overflow:hidden}
  @keyframes catRight{from{opacity:0;transform:scale(.9) translateX(20px)}to{opacity:1;transform:scale(1) translateX(0)}}
  @keyframes catUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sv-cat-popup-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid rgba(255,255,255,.08);font-size:16px;font-weight:600}
  .sv-cat-popup-head button{background:none;border:none;color:#aaa;font-size:24px;cursor:pointer}
  .sv-cat-popup-grid{display:flex;flex-direction:column;gap:4px;padding:12px;overflow-y:auto;overflow-x:hidden;flex:1;min-height:0;-webkit-overflow-scrolling:touch}
  .sv-cat-popup-grid::-webkit-scrollbar{width:3px}
  .sv-cat-popup-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
  .sv-cat-pop-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:13px;padding:8px 12px;border-radius:10px;cursor:pointer;font-family:inherit;text-align:left;width:100%;box-sizing:border-box;word-break:break-all}
  .sv-cat-pop-chip.is-active{background:rgba(238,90,36,.2);border-color:#ee5a24;font-weight:600}
  .sv-cat-pop-back{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.18);color:#ffb38a;font-weight:600}
  .sv-cat-group-title{color:rgba(255,255,255,.5);font-size:12px;margin:10px 2px 4px;font-weight:600;letter-spacing:.5px}
  .sv-cat-group-title:first-child{margin-top:2px}
  .sv-cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1)}
  .sv-cat-tab{width:auto;flex:1 0 auto;min-width:64px;text-align:center;font-weight:600;color:rgba(255,255,255,.7);background:rgba(255,255,255,.05)}
  .sv-cat-tab.is-set{color:#ffb38a}
  .sv-cat-tab.is-active{background:rgba(238,90,36,.2);border-color:#ee5a24;color:#fff}

  .sv-src-item{display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:15px;color:#fff;border:1px solid transparent;margin-bottom:4px}
  .sv-src-item.active{background:rgba(238,90,36,.18);border-color:#ee5a24}
  .sv-src-type{font-size:11px;color:#aaa;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:6px}
  .sv-src-cat{font-size:11px;color:#7fd6ff;background:rgba(127,214,255,.12);padding:1px 6px;border-radius:6px}
  .sv-src-mode{font-size:11px;color:#7fdb8a;background:rgba(127,219,138,.12);padding:1px 6px;border-radius:6px}

  /* ===== 设置内换源列表 ===== */
  .sv-src-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 0;align-content:start}
  .sv-src-grid .sv-src-item{padding:10px;margin:0;border-radius:10px;cursor:pointer;font-size:14px;color:#fff;border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;align-items:stretch;gap:6px;background:rgba(255,255,255,.04)}
  .sv-src-grid .sv-src-item.active{background:rgba(238,90,36,.15);border-color:rgba(238,90,36,.4)}
  .sv-src-grid .sv-src-name{flex:1;min-width:0;font-size:14px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sv-src-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .sv-src-meta{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
  .sv-src-market{font-size:11px;color:#ffd54f;background:rgba(255,213,79,.14);padding:1px 6px;border-radius:6px}
  .sv-src-rand{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#aaa;font-size:13px;width:32px;height:32px;border-radius:50%;cursor:pointer;flex-shrink:0;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .sv-src-grid .sv-src-rand{width:26px;height:26px;font-size:12px}
  .sv-src-rand.is-on{background:rgba(238,90,36,.25);border-color:#ee5a24;color:#fff}
  /* 换源页：内置源 / 市场源 子 tab */
  .sv-src-subtabs{display:flex;gap:6px;padding:6px 0 10px}
  .sv-src-subtab{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#ccc;font-size:13px;padding:8px 0;border-radius:9px;cursor:pointer;font-family:inherit;transition:all .2s}
  .sv-src-subtab.is-active{background:rgba(238,90,36,.18);border-color:#ee5a24;color:#fff}

  /* ===== 获取源（源市场） ===== */
  .sv-market-overlay{position:fixed;inset:0;z-index:85;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
  .sv-market-overlay.is-visible{opacity:1;pointer-events:auto}
  .sv-market-panel{width:92%;max-width:420px;max-height:80vh;background:rgba(21,21,31,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 6px 30px rgba(0,0,0,.5);animation:mkUp .25s ease}
  @keyframes mkUp{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  .sv-market-head{display:flex;align-items:center;gap:8px;padding:16px;border-bottom:1px solid rgba(255,255,255,.08);font-size:16px;font-weight:600}
  .sv-market-head>span{flex:1}
  .sv-market-refresh,.sv-market-close{background:none;border:none;color:#aaa;font-size:22px;line-height:1;cursor:pointer;padding:0 4px}
  .sv-market-refresh:active,.sv-market-close:active{color:#fff}
  .sv-market-list{padding:8px 12px;overflow-y:auto;flex:1;min-height:0;-webkit-overflow-scrolling:touch}
  .sv-market-list::-webkit-scrollbar{width:4px}
  .sv-market-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
  .sv-market-row{display:flex;align-items:center;gap:10px;padding:12px 10px;border-radius:12px;margin-bottom:6px;background:rgba(255,255,255,.04)}
  .sv-market-row.is-installed{border-left:3px solid rgba(127,214,255,.45)}
  .sv-market-info{flex:1;min-width:0}
  .sv-market-name{font-size:15px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sv-market-meta{font-size:12px;color:#999;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sv-market-tag{display:inline-block;font-size:11px;color:#7fd6ff;background:rgba(127,214,255,.12);padding:1px 6px;border-radius:6px;margin-right:6px}
  .sv-market-dl{background:#ee5a24;color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;flex-shrink:0;white-space:nowrap}
  .sv-market-dl:disabled{background:rgba(255,255,255,.15);color:#aaa;cursor:default}
  .sv-market-dl.is-done{background:rgba(127,219,138,.25);color:#7fdb8a}
  .sv-market-installed{display:inline-block;font-size:11px;color:#7fdb8a;background:rgba(127,219,138,.14);padding:4px 8px;border-radius:8px;flex-shrink:0;white-space:nowrap}
  .sv-market-del{background:transparent;color:#ff6b6b;border:1px solid rgba(255,107,107,.5);border-radius:9px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;flex-shrink:0;white-space:nowrap}
  .sv-market-del:hover{background:rgba(255,107,107,.15)}
  .sv-market-del:disabled{color:#aaa;border-color:rgba(255,255,255,.2);cursor:default}
  .sv-market-hint{padding:10px 14px;font-size:12px;color:#7fd6ff;border-top:1px solid rgba(255,255,255,.06);line-height:1.5}
  .sv-market-loading{text-align:center;color:#aaa;padding:30px;font-size:14px}
  .sv-market-err{text-align:center;color:#ff8a80;padding:20px;font-size:13px;line-height:1.6}
  .sv-market-diag{background:#1e1e1e;color:#9ccc65;border:1px solid #444;border-radius:8px;padding:10px 12px;margin:0 0 14px;font-size:12px;line-height:1.5;word-break:break-all}
  .sv-market-diag b{color:#ffd54f;display:block;margin-bottom:4px}
  .sv-market-diag pre{margin:6px 0 0;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto;background:#000;padding:8px;border-radius:6px;color:#80d8ff}
  .sv-set-log-title{margin:14px 0 6px;font-size:12px;color:#ffd54f;font-weight:600}
  .sv-set-log{background:#1e1e1e;color:#9ccc65;border:1px solid #444;border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.5;word-break:break-all;max-height:280px;overflow:auto}
  .sv-set-log b{color:#ffd54f;display:block;margin-bottom:4px}
  .sv-set-log pre{margin:6px 0 0;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto;background:#000;padding:8px;border-radius:6px;color:#80d8ff}
  /* 诊断日志开关 */
  .sv-switch{position:relative;display:inline-block;width:38px;height:20px;flex:0 0 auto}
  .sv-switch input{opacity:0;width:0;height:0}
  .sv-switch-slider{position:absolute;cursor:pointer;inset:0;background:#555;border-radius:20px;transition:.2s}
  .sv-switch-slider:before{content:"";position:absolute;height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .sv-switch input:checked + .sv-switch-slider{background:#ee5a24}
  .sv-switch input:checked + .sv-switch-slider:before{transform:translateX(18px)}
  /* 密码认证弹窗 */
  .sv-pwd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:90}
  .sv-pwd-overlay[hidden]{display:none}
  .sv-pwd-panel{background:#222;color:#fff;border:1px solid #444;border-radius:12px;padding:20px;width:280px;max-width:86vw;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .sv-pwd-title{font-size:15px;font-weight:600;margin-bottom:12px}
  .sv-pwd-panel input{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid #555;background:#111;color:#fff;font-size:14px;margin-bottom:8px;outline:none}
  .sv-pwd-err{color:#ff6b6b;font-size:12px;min-height:16px;margin-bottom:10px}
  .sv-pwd-actions{display:flex;gap:8px}
  .sv-pwd-actions button{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
  .sv-pwd-actions .sv-pwd-ok{background:#ee5a24;color:#fff;font-weight:600}
  .sv-pwd-actions .sv-pwd-cancel{background:#555;color:#fff}
</style>
</head>
<body>
<div class="sv-page">
    <div class="sv-stage">
    <div class="sv-swiper swiper">
            <ul class="swiper-wrapper" aria-live="polite"></ul>

            <!-- Actions -->
            <div class="sv-stage-overlay">
                <aside class="sv-actions">
                    <button class="sv-action sv-set-action" id="setBtn" type="button" aria-label="设置">
                        <span class="sv-action-icon"><svg viewBox="0 0 24 24"><path fill="#fff" d="M19.14 12.94a7.49 7.49 0 000-1.88l2.03-1.58a.5.5 0 00.12-.64l-1.92-3.32a.5.5 0 00-.6-.22l-2.39.96a7.3 7.3 0 00-1.62-.94l-.36-2.54a.5.5 0 00-.5-.42h-3.84a.5.5 0 00-.5.42l-.36 2.54c-.58.24-1.12.56-1.62.94l-2.39-.96a.5.5 0 00-.6.22L2.71 8.84a.5.5 0 00.12.64l2.03 1.58a7.49 7.49 0 000 1.88l-2.03 1.58a.5.5 0 00-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.58-.24 1.12-.56 1.62-.94l2.39.96c.21.09.47 0 .6-.22l1.92-3.32a.5.5 0 00-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1112 8.5a3.5 3.5 0 010 7z"/></svg></span>
                        <span class="sv-action-count">设置</span>
                    </button>
                    <button class="sv-action" id="catActionBtn" type="button" aria-label="分类">
                        <span class="sv-action-icon">
                            <svg viewBox="0 0 24 24" fill="#fff"><path d="M3 4h8l2 2h8v12H3V4zm0 14V6h8.59L13.41 8H21v10H3z"/></svg>
                        </span>
                        <span class="sv-action-count">分类</span>
                    </button>
                    <button class="sv-action" id="loopBtn" type="button" aria-label="连播">
                        <span class="sv-action-icon">
                            <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                        </span>
                        <span class="sv-action-count">连播</span>
                    </button>
                    <button class="sv-action" id="fitBtn" type="button" aria-label="原始">
                        <span class="sv-action-icon">
                            <svg viewBox="0 0 24 24" fill="#fff"><path d="M5 5h14v2H5zm0 4h14v2H5zm0 4h14v2H5zm0 4h10v2H5z"/></svg>
                        </span>
                        <span class="sv-action-count">原始</span>
                    </button>
                    <button class="sv-action sv-fullscreen-btn" type="button" aria-label="全屏" title="全屏">
                        <span class="sv-action-icon">
                            <svg class="sv-fullscreen-icon sv-fullscreen-icon--enter" viewBox="0 0 20 20" fill="none"><path d="M15.2 4H4c-.88 0-1.6.72-1.6 1.6v8c0 .88.72 1.6 1.6 1.6h11.2c.88 0 1.6-.72 1.6-1.6v-8c0-.88-.72-1.6-1.6-1.6z" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.6 9.6V7.2H8" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.6 9.6V12h-2.4" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            <svg class="sv-fullscreen-icon sv-fullscreen-icon--exit" viewBox="0 0 20 20" fill="none"><path d="M15.2 4H4c-.88 0-1.6.72-1.6 1.6v8c0 .88.72 1.6 1.6 1.6h11.2c.88 0 1.6-.72 1.6-1.6v-8c0-.88-.72-1.6-1.6-1.6z" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.6 9l2.4.02.02-2.4" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 10.6l-2.4-.02v2.4" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </span>
                        <span class="sv-action-count">全屏</span>
                    </button>
                    <button class="sv-action sv-action--mute is-muted" type="button" aria-label="点击开启声音">
                        <span class="sv-action-icon">
                            <svg class="sv-mute-icon sv-mute-icon--on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                            <svg class="sv-mute-icon sv-mute-icon--off" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                        </span>
                        <span class="sv-action-count">声音</span>
                    </button>
                </aside>
            </div>

            <!-- Loading / Error -->
            <div class="sv-loading" role="status"><span class="sv-loading-spinner"></span><span class="sv-loading-text">加载中…</span></div>
            <div class="sv-error" role="alert" hidden><div class="sv-error-icon"><svg viewBox="0 0 64 41"><rect x="8" y="12" width="48" height="26" rx="4" fill="currentColor"/><circle cx="22" cy="25" r="3" fill="#000"/><circle cx="42" cy="25" r="3" fill="#000"/><path d="M28 32h8" stroke="#000" stroke-width="2" fill="none"/></svg></div><p class="sv-error-msg">视频列表加载失败</p><button class="sv-error-retry" type="button">重新加载</button></div>
        </div>

        <!-- Hint -->
        <div class="sv-wheel-hint" role="dialog" aria-hidden="true">
            <div class="sv-wheel-inner">
                <div class="sv-wheel-anim"><span class="sv-wheel-dot"></span><span class="sv-wheel-arrow"></span></div>
                <h2 class="sv-wheel-title">滚动或按 ↑/↓ 切换视频</h2>
                <p class="sv-wheel-desc">点击右侧按钮打开设置</p>
                <button class="sv-wheel-close" type="button">我知道了</button>
            </div>
        </div>

        <!-- 阶段3：设置 / 额度 / 分类弹窗 -->
        <div class="sv-set-overlay" id="setOverlay"></div>
        <div class="sv-set-panel" id="setPanel">
            <div class="sv-set-head"><span>设置</span><button class="sv-set-close" id="setPanelClose" type="button">×</button></div>
            <div class="sv-set-tabs">
                <button class="sv-set-tab is-active" data-tab="sources" type="button">换源</button>
                <button class="sv-set-tab" data-tab="manage" type="button">源管理</button>
                <button class="sv-set-tab" data-tab="general" type="button">通用</button>
            </div>
            <div class="sv-set-body">
                <div class="sv-set-page" data-page="sources">
                    <div class="sv-src-subtabs">
                        <button class="sv-src-subtab is-active" data-srctab="builtin" type="button">内置源</button>
                        <button class="sv-src-subtab" data-srctab="market" type="button">市场源</button>
                    </div>
                    <div class="sv-src-grid" id="srcGrid"></div>
                </div>
                <div class="sv-set-page" data-page="manage" hidden>
                    <div class="sv-set-manage-bar" style="display:flex;gap:8px">
                        <button class="sv-set-btn-action" id="addSrcBtn" type="button" style="margin-top:0;flex:1">+ 新增源</button>
                        <button class="sv-set-btn-action" id="marketBtn" type="button" style="margin-top:0;flex:1;background:#2b6cb0">获取源</button>
                    </div>
                    <div class="sv-src-manage-list" id="srcManageList"></div>
                    <form class="sv-src-add-form" id="srcAddForm" hidden>
                        <label>名称</label><input name="name" type="text" placeholder="源名称">
                        <label>地址</label><input name="url" type="text" placeholder="https://... 或 .txt 列表地址">
                        <label>类型</label>
                        <select name="type"><option value="feed">feed 流</option><option value="txt">TXT 列表</option><option value="direct">直链</option><option value="yujn">yujn</option><option value="douyidou">抖一抖</option><option value="wudada">wudada</option></select>
                        <label>模式</label>
                        <select name="mode"><option value="single">单集</option><option value="multi">多集</option></select>
                        <label>分类(key:label, 逗号分隔)</label><input name="categories" type="text" placeholder="rm:热门,tuijian:推荐">
                        <label>分类地址模板(用 {cat} 占位)</label><input name="urlTemplate" type="text" placeholder="https://...?cat={cat}">
                        <div class="sv-form-actions">
                            <button type="submit" class="sv-set-btn-action" style="margin-top:0">保存</button>
                            <button type="button" class="sv-mng-btn" id="cancelAdd">取消</button>
                        </div>
                    </form>
                </div>
                <div class="sv-set-page" data-page="general" hidden>
                    <div class="sv-set-row"><span>当前源</span><b id="setCurSrc">-</b></div>
                    <button class="sv-set-btn-action" id="exportBtn" type="button">覆盖本地源</button>
                    <button class="sv-set-btn-action" id="restoreBtn" type="button">恢复默认源</button>
                    <button class="sv-set-btn-action" id="clearCacheBtn" type="button" style="background:#555">清理缓存</button>
                    <div class="sv-set-hint" id="setHint"></div>
                    <!-- TuWei 账号：手动输入用户名/密码，注册获取 X-Client-Token -->
                    <div class="sv-tuwei-box">
                        <div class="sv-tuwei-title">TuWei 账号（刷新 X-Client-Token）</div>
                        <label>用户名</label>
                        <input id="tuweiUser" type="text" placeholder="请输入用户名" autocomplete="off">
                        <label>密码</label>
                        <input id="tuweiPwd" type="text" placeholder="请输入密码" autocomplete="off">
                        <button class="sv-set-btn-action" id="tuweiTokenBtn" type="button" style="background:#2b6cb0;margin-top:10px">获取 Token</button>
                        <div class="sv-set-hint" id="tuweiHint"></div>
                    </div>
                    <div class="sv-set-log-title" style="display:flex;align-items:center;justify-content:space-between">
                        <span>诊断日志（清单 / 内置源 / 导出源）</span>
                        <label class="sv-switch" title="显示/隐藏诊断日志">
                            <input type="checkbox" id="debugLogToggle">
                            <span class="sv-switch-slider"></span>
                        </label>
                    </div>
                    <div class="sv-set-log" id="debugLog">（暂无诊断数据，打开本页或下载源后会自动刷新）</div>
                </div>
            </div>
        </div>

        <div class="sv-feed-quota" id="feedQuota" hidden></div>

        <div class="sv-cat-popup" id="catPopup" hidden>
            <div class="sv-cat-popup-inner">
                <div class="sv-cat-popup-head"><span>选择分类</span><button id="catPopupClose" type="button">×</button></div>
                <div class="sv-cat-popup-grid" id="catPopupGrid"></div>
            </div>
        </div>

        <!-- 获取源（源市场） -->
        <div class="sv-market-overlay" id="marketOverlay" hidden>
            <div class="sv-market-panel">
                <div class="sv-market-head">
                    <span>获取源</span>
                    <button class="sv-market-refresh" id="marketRefresh" type="button" title="刷新">⟳</button>
                    <button class="sv-market-close" id="marketClose" type="button">×</button>
                </div>
                <div class="sv-market-list" id="marketList"></div>
                <div class="sv-market-hint" id="marketHint">从远程清单加载可用源，点击「下载」保存到本地 sources/ 文件夹</div>
            </div>
        </div>

        <!-- 获取源密码认证 -->
        <div class="sv-pwd-overlay" id="pwdOverlay" hidden>
            <div class="sv-pwd-panel">
                <div class="sv-pwd-title">获取源需要密码</div>
                <!-- type=text：避免 Hiker 对 password 字段调用「安全键盘」（无中文输入法），密码含中文(渡鸦)必须用普通键盘 -->
                <input type="text" id="pwdInput" placeholder="请输入密码（含中文）" autocomplete="off" inputmode="text">
                <div class="sv-pwd-err" id="pwdErr"></div>
                <div class="sv-pwd-actions">
                    <button class="sv-pwd-ok" id="pwdOk" type="button">确定</button>
                    <button class="sv-pwd-cancel" id="pwdCancel" type="button">取消</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js"></script>



<script src="engine.js"></script>
<script src="sources.js"></script>
<script src="sv_multi.js"></script>
<!-- 获取源（源市场）：远程清单 + 真实文件下载 + 动态加载 sources/ 文件夹 -->
<script src="sourceMarket.js"></script>
</body>
</html>

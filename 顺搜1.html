body {

.switch, .CLOSE {

	z-index: 1;
	width: 100%;
	bottom: 90px;
	top: 0;
	left: 0;
}
.CLOSE {
	display: none;
	z-index: 2;
}
li:active,
#app_sel:active,
#ONE_play:active,
button:active,
.function:active,
.s1:active,
#set_pic:active,
#today:active,
#input-clear:active {
	animation: click 0.8s ease-in-out infinite;
}
#set_pic:active {
	border-radius: 8px;

#input-clear:active {
	background-color: rgba(255, 0, 0, .5);
	border-radius: 28px
}
@keyframes click {
0% {transform: scale(0.85)}
50% {transform: scale(1.1);}
100% {transform: scale(0.85)}
}
@keyframes click_in {
0% {transform: scale(0.0)}
40% {transform: scale(1.05)}
100% {transform: scale(1) }
}
@keyframes close {
0%{transform:scale(1);} 
100%{transform:scale(0);opacity:0}
}
@keyframes 功能开 {
0% {width: 7px; height: 7px; opacity: 0.1;}
100% {width: 60px; height: 7px; opacity: 0.9;}
}
@keyframes 功能关 {
0% {width: 60px; height: 7px; opacity: 0.9;}
100% {width: 7px; height: 7px; opacity: 0.1;}
}
@keyframes plus {
0% {transform: scale(1);}
100% {transform: scale(1.4);}
}
@keyframes reduce {
0% {transform: scale(1.4);}
100% {transform: scale(1);}
}
@keyframes 淡入 {
0% {transform: scale(1); opacity: 0;}
100% {transform: scale(1.05); opacity: 1;}
}
@keyframes 淡出 {
0% {transform: scale(1.05); opacity: 1;}
100% {transform: scale(1); opacity: 0;}
}
@keyframes 天气 {
0% {transform: scale(1); opacity: 0;}
20% {transform: scale(1.05); opacity: .5;}
60% {transform: scale(1.05); opacity:,5;}
100% {transform: scale(1); opacity: 0;}
}
@keyframes drop {
0% {width: 55px; height: 55px;border-radius: 50%; left: 50%; margin-top: 90%;}
70% {width: 55px; height: 45px;border-radius: 50%; left: 79%; margin-top: 0px;}
100% {width: 55px; height: 55px;border-radius: 50%; left: 83%; margin-top: 10px;}
}
@keyframes drop_open {
0% {left: 83%; margin-top: 0; width: 60px; height: 60px; border-radius: 50%;}
40% {left: 0; margin-top: 10px; width: 100%; height: 75%; border-radius: 15px;}
100% {right: auto; left: 3%; margin-top: 10px; width: 94%; bottom: 40px;
 height: auto; border-radius: 15px;}
}
@keyframes 天气_open {
0% {opacity: 0; left: -50%; transform: scale(.2) translate3d(0, 0, 0);}
40% {opacity: 1; left: 0; transform: scale(1.03);}
100% {opacity: 1; left: 0; transform: scale(1);}
}
@keyframes 天气_close {
0% {opacity: 1; left: 0; transform: scale(1);}
100% {opacity: 0; left: -40%; transform: scale(.4);}
}
@keyframes slideDownReturn0 {
0% {transform: translate3d(0, 100%, 0); opacity: 0;}
100% {transform: translate3d(0, 0, 10px); opacity: 1;}
}
@keyframes slideDownReturn{0%{opacity:0;transform:scale(.2) translateY(300%);transform-origin:50% 100%}to{opacity:1;transform:scale(1) translate(0);transform-origin:50% 100%}}
@keyframes spaceOutDown{0%{opacity:1;transform:scale(1) translate(0);transform-origin:50% 100%}to{opacity:0;transform:scale(.2) translateY(300%);transform-origin:50% 100%}}

input[type=checkbox]::before {
	position: absolute;
	content: "";
	transition: all 300ms cubic-bezier(.45, 1, .4, 1);
	border-radius: 60px;
	width: 60px;
	height: 24px;
	background-color: #e9e9eb;
}
input[type=checkbox]::after {
	position: absolute;
	left: 3px;
	top: 3px;
	border-radius: 50px;
	width: 18px;
	height: 18px;
	background-color: #fff;
	box-shadow: 1px 1px 5px rgba(#000, .3);
	content: "";
	transition: all 300ms cubic-bezier(.4, .4, .25, 1.35);
}
input[type=checkbox]:checked {
	background-color: #6ED6CE;
}
input[type=checkbox]:checked::before {
	transform: scale(0);
}
input[type=checkbox]:checked::after {
	transform: translateX(35px);

async function PreviewImage(fileObj) {
	let allowExtention = ".jpg,.jpeg,.bmp,.gif,.png,.webp,.svg";
	let extention = fileObj.value.substring(fileObj.value.lastIndexOf(".") + 1).toLowerCase();
	const isGifOrSvg = extention === 'gif' || extention === 'svg';
	if (allowExtention.indexOf(extention) > -1) {
		let pic_name = fileObj.files[0].name;
		$("#tupian").val("轮播库_"+pic_name);
		// 统一使用FileReader读取文件
		let reader = new FileReader();
		if (isGifOrSvg) {
			// 特殊处理：GIF/SVG直接转base64保存（不经过Image对象）
			reader.readAsDataURL(fileObj.files[0]);
			reader.onload = function(e) {
				let base64Url = e.target.result;
				// 直接保存原始base64数据
				fba.saveImage(base64Url, SS_Pictures + pic_name);
				轮播图组("增加", pic_name);
			};
			return;
		}
		// 普通图片处理流程
		reader.readAsDataURL(fileObj.files[0]);
		reader.onload = function(e) {
			let base64Url = e.target.result;
			let img = new Image();
			img.src = base64Url;
			img.onload = function() {
				if (this.height > 5000 || (fileObj.files[0].size/1024 > 20240)) {
					dealImage(base64Url, 2160, function(base64) {
						fba.saveImage(base64, SS_Pictures + pic_name);
						轮播图组("增加", pic_name);
					});
					fba.log("高度: " + this.height + " 已压缩 "+pic_name);
				} else {
					fba.saveImage(base64Url, SS_Pictures + pic_name);
					轮播图组("增加", pic_name);
				}
			};
		};
	} else {
		Alert("温馨提示","仅支持图片文件");
		fileObj.value = "";
	}
}
//压缩图片
async function dealImage(base64, w, callback) {
	var newImage = new Image();
	var quality = 0.3;
	newImage.src = base64;
	newImage.setAttribute("crossOrigin", 'Anonymous');
	var imgWidth, imgHeight;
	newImage.onload = function () {
		imgWidth = this.width;
		imgHeight = this.height;
		var canvas = document.createElement("canvas");
		var ctx = canvas.getContext("2d");
		if (Math.max(imgWidth, imgHeight) > w) {
			if (imgWidth > imgHeight) {
				canvas.width = w;
				canvas.height = w * imgHeight / imgWidth;
			} else {
				canvas.height = w;
				canvas.width = w * imgWidth / imgHeight;
			}
		} else {
			canvas.width = imgWidth;
			canvas.height = imgHeight;
			quality = 0.5;
		}
		ctx.clearRect(0, 0, canvas.width, canvas.height);
		ctx.drawImage(this, 0, 0, canvas.width, canvas.height);
		var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
		for(var i = 0; i < imageData.data.length; i += 4) {
			if(imageData.data[i + 3] == 0) {
				imageData.data[i] = 255;
				imageData.data[i + 1] = 255;
				imageData.data[i + 2] = 255;
				imageData.data[i + 3] = 255;
			}
		}
		ctx.putImageData(imageData, 0, 0);
		var base64 = canvas.toDataURL("image/jpg", quality);
		callback(base64);
	}
}

function 重定向(SRC) {
	clearInterval(timer);
	function createIp() {
		a = Math.round(Math.random() * 250) + 1,
		b = Math.round(Math.random() * 250) + 1,
		c = Math.round(Math.random() * 240) + 1,
		d = Math.round(Math.random() * 240) + 1;
		return [a, b, c, d].join('.');
	}
	let ip = createIp();
	let headers = { 'Accept': 'image/avif,image/webp,image/png,text/html,image/svg+xml,image/*,*/*;q=0.8', 'Referer': '', 'Sec-Fetch-Dest': 'image', 'User-Agent': 'MOBILE_UA', 'x-forwarded-for': ip, 'WL-Proxy-Client-IP': ip };
	requestAsync(SRC, {headers: headers, withHeaders: true, redirect: false, withStatusCode: true }, function (SRC, code) {
		let codeJson = JSON.parse(code);
		let cod = codeJson.statusCode;
		if (cod == 302 || cod == 301) {
			let body = codeJson.body;
			let headers = codeJson.headers;
			let img_url = headers.location.length > 0 ? headers.location.join(''): "";
			if(img_url.indexOf(SRC) == 0) {
				return 重定向(img_url)
			} else {
				if (img_url.indexOf("http") == 0) {
					img_url = img_url
				} else {
					img_url = "https:"+img_url
				}
				let newImg = new Image();
				newImg.src = img_url;
				if ($(".two").length==0) $('<img class="pics_img two">').appendTo("#main_img");
				if(!newImg.onload && i==0) {
					let img = 网图缓存
					if(!request(img)) img=默认图;
					$(".one").attr('src', img + '?t=' + new Date());
					$(".one").css({"animation":"淡入 0.9s linear forwards"});
				}
				newImg.onload = () => {
					function picIn() {
						$(".one").css({"animation":"淡出 0.9s linear forwards"});
						$(".two").attr('src', newImg.src);
						$(".two").css({"animation":"淡入 0.9s linear forwards"});
						setTimeout(function() {
							$(".one").attr('src', newImg.src);
							$(".one").css("opacity", "0");
						}, 900);
					}
					if(启用轮播!=true) {
						picIn()
					} else {
						if(i%2==0) {
							picIn()
						} else {
							$(".two").css({"animation":"淡出 0.9s linear forwards"});
							$(".one").attr('src', newImg.src);
							$(".one").css({"animation":"淡入 0.9s linear forwards"});
						}
						timer = setInterval(function() {
							i++
							重定向(SRC)
						}, 3000);
					}
					fba.saveImage(newImg.src, 网图缓存);
				}
			}
		} else if (cod== "" || cod == 502 || cod == 404 || cod == -1) {
			$(".pics_img").attr('src', 默认图);
		} else {
			$(".pics_img").attr('src', SRC);
			fba.saveImage(SRC, 网图缓存);
		}
	});
}

function 搜索记录(way, input) {
	let lishi_0 = request(ln+'顺搜_History.json') || "[]";
	lishi = JSON.parse(lishi_0);
	let ccc = lishi.indexOf(input);
	if (way == "增加") {
		if(ccc >-1) lishi.splice(ccc,1);
		lishi.push(input);
	} else if (way=="删除") {
		confirmAsync("将删除词条", input, () => {
			lishi.splice(ccc,1)
			Refresh_lishi()
		});
	}
	function Refresh_lishi() {
		function cleanString(str) {
			return str.replace(/<\/?p>/g, '').trim();
		}
		lishi=lishi.slice(-28).map(cleanString).filter(str => str);
		let History ="";
		for (let i = lishi.length - 1; i >= 0; i--) {
			History += "<li><p>"+lishi[i].substring(0, 18).replace(/<\/?p>/g, '')+"</p></li>";
		}
		$("#lishiList").html(History);
		let lishi_1=JSON.stringify(lishi);
		if(lishi_1!=lishi_0) fba.writeFile(ln+'顺搜_History.json',lishi_1);
	}
	Refresh_lishi()
}

function applyDarkModeStyles() {
	const isPktDevice = /pk/i.test(navigator.userAgent);
	const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
	if (isPktDevice && isDarkMode) {
		//fba.log("检测到coloros设备，应用暗色模式样式");
		document.documentElement.classList.add('dark-mode-pkt');
		document.documentElement.style.setProperty('--background-color', '#000000');
		document.documentElement.style.setProperty('--part-background', 'rgba(10,10,10,0.9)');
		document.documentElement.style.setProperty('--mask_toTop', 'linear-gradient(to top, #000000, transparent 100%)');
	}
}
// 初始检测
document.addEventListener('DOMContentLoaded', applyDarkModeStyles);
window.addEventListener('load', applyDarkModeStyles);
// 延迟检测（防止某些设备初始值不准确）
setTimeout(applyDarkModeStyles, 100);
// 监听暗色模式变化
const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
darkModeMediaQuery.addListener(applyDarkModeStyles);
// 监听DOM变化（适用于动态加载内容）
const observer = new MutationObserver(applyDarkModeStyles);
observer.observe(document.documentElement, { childList: true, subtree: true });
